<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prime Tools</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>PRIME TOOLS</h1>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</header>

<div class="container">

    <div class="card">
        <h2>Prime API Platform</h2>
        <p>Membuat API Key dengan cepat dan aman.</p>

        <button class="btn">Mulai Sekarang</button>
    </div>

    <div class="card api-box">

        <h2>Generate API Key</h2>

        <div class="api-row">

            <input id="apikey" readonly placeholder="Klik Generate">

            <button class="btn" onclick="generateKey()">
                Generate
            </button>

            <button class="btn" onclick="copyKey()">
                Copy
            </button>

        </div>

    </div>

    <div class="card">

        <h2>Fitur</h2>

        <ul>
            <li>✅ Generate API Key</li>
            <li>✅ Copy API Key</li>
            <li>✅ Dark Mode</li>
            <li>🚀 Endpoint API (Segera)</li>
            <li>📊 Dashboard (Segera)</li>
        </ul>

    </div>

</div>

<footer>
Prime Tools © 2026
</footer>  

</body>
</html>
